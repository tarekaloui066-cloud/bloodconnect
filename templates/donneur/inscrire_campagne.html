{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header bg-primary text-white text-center py-3 rounded-top-4">
                <h3 class="mb-0 fw-bold">📝 S'inscrire à la Campagne</h3>
            </div>
            <div class="card-body p-4">
                <h5 class="fw-bold mb-3">{{ campagne.nom }}</h5>
                <p class="text-muted mb-4">
                    <i class="fas fa-map-marker-alt me-2"></i>{{ campagne.lieu }}<br>
                    <i class="fas fa-calendar me-2"></i>{{ campagne.date_debut|date:"d/m/Y" }} - {{ campagne.date_fin|date:"d/m/Y" }}
                </p>

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Choisissez un créneau</label>
                        <select name="creneau_id" class="form-select form-select-lg" required>
                            <option value="" selected disabled>-- Sélectionner un créneau --</option>
                            {% for creneau in creneaux %}
                            <option value="{{ creneau.id }}">
                                {{ creneau.date|date:"d/m/Y" }} - {{ creneau.heure_debut|time:"H:i" }}-{{ creneau.heure_fin|time:"H:i" }}
                                ({{ creneau.places_restantes }}/{{ creneau.capacite }} places)
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-grid gap-2 d-sm-flex justify-content-center">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill px-5 fw-bold">
                            <i class="fas fa-check me-2"></i>Confirmer l'inscription
                        </button>
                        <a href="{% url 'donneur:mes_campagnes' %}" class="btn btn-secondary btn-lg rounded-pill px-5 fw-bold">
                            Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
