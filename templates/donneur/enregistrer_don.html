{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card border-0 shadow-sm p-4">
        <div class="d-flex align-items-center mb-4">
          <div class="bg-success bg-opacity-10 p-3 rounded-3 me-3">
            <i class="fas fa-tint text-success fs-4"></i>
          </div>
          <div>
            <h4 class="mb-0 fw-bold">Enregistrer un Don</h4>
            <p class="text-muted mb-0 small">Renseignez les informations de votre don</p>
          </div>
        </div>

        {% if messages %}
          {% for msg in messages %}
            <div class="alert alert-{{ msg.tags }} alert-dismissible fade show">
              {{ msg }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-bold small text-uppercase">Date du don</label>
            {{ form.date_don }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small text-uppercase">Établissement</label>
            {{ form.etablissement }}
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold small text-uppercase">Notes (facultatif)</label>
            {{ form.notes }}
          </div>
          <div class="d-flex gap-2 justify-content-end">
            <a href="{% url 'donneur:dashboard' %}" class="btn btn-outline-secondary rounded-pill px-4">Annuler</a>
            <button type="submit" class="btn btn-success rounded-pill px-4 fw-bold">
              <i class="fas fa-save me-1"></i> Enregistrer
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
