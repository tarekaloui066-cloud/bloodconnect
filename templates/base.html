<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloodConnect - Don de Sang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --blood-red: #E63946;
            --blood-red-dark: #C1121F;
            --medical-white: #F8F9FA;
            --medical-light: #FFF5F5;
        }
        body {
            background: linear-gradient(135deg, #FFF5F5 0%, #F8F9FA 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: var(--blood-red) !important;
            box-shadow: 0 2px 15px rgba(230, 57, 70, 0.3);
            padding: 0.8rem 0;
        }
        .navbar-brand { font-weight: 700; font-size: 1.5rem; }
        .nav-link {
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            border-radius: 20px;
            transition: all 0.3s ease;
            margin: 0 5px;
            color: white !important;
        }
        .nav-link:hover { background: rgba(255,255,255,0.2); }
        .container { max-width: 1200px; }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .btn-blood {
            background: var(--blood-red);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
            text-decoration: none;
        }
        .btn-blood:hover { background: var(--blood-red-dark); color: white; }
        .btn-logout {
            background: none;
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 500;
            transition: 0.3s;
        }
        .btn-logout:hover { background: white; color: var(--blood-red) !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand text-white" href="{% url 'home' %}">
                <i class="fas fa-heartbeat me-2"></i>BloodConnect
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto align-items-center">
                    <form class="d-flex mx-auto mt-2 mt-lg-0" method="GET" action="{% url 'hopital:liste_hopitaux' %}" style="max-width:400px;width:100%;">
                        <div class="input-group">
                            <input class="form-control shadow-none" type="search" name="q"
                                   placeholder="Rechercher un hôpital..."
                                   style="border-radius:20px 0 0 20px;border:none;border-right:1px solid #eee;">
                            <button class="input-group-text bg-white" type="submit"
                                    style="border-radius:0 20px 20px 0;border:none;cursor:pointer;">
                                <i class="fas fa-search" style="color:var(--blood-red);"></i>
                            </button>
                        </div>
                    </form>

                    {% if user.is_authenticated %}
                        {% if user.donneur %}
                            <a class="nav-link" href="{% url 'donneur:dashboard' %}">
                                <i class="fas fa-user me-1"></i>Profil
                            </a>
                        {% elif user.hopital %}
                            <a class="nav-link" href="{% url 'hopital:dashboard' %}">
                                <i class="fas fa-hospital me-1"></i>Profil
                            </a>
                        {% endif %}
                        <form method="post" action="{% url 'logout' %}" class="ms-2">
                            {% csrf_token %}
                            <button type="submit" class="btn-logout">
                                <i class="fas fa-sign-out-alt me-1"></i>Déconnexion
                            </button>
                        </form>
                    {% else %}
                        <a class="nav-link" href="{% url 'accounts:login' %}">Connexion</a>
                        <a class="nav-link" href="{% url 'accounts:register' %}">Inscription</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
