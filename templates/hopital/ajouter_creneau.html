{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header bg-success text-white text-center py-3 rounded-top-4">
                <h3 class="mb-0 fw-bold">➕ Ajouter un Créneau</h3>
            </div>
            <div class="card-body p-4">
                <p class="text-muted mb-4">
                    <strong>Campagne:</strong> {{ campagne.nom }}
                </p>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Date</label>
                        {{ form.date }}
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold">Heure de début</label>
                            {{ form.heure_debut }}
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold">Heure de fin</label>
                            {{ form.heure_fin }}
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Capacité du créneau</label>
                        {{ form.capacite }}
                    </div>

                    <div class="d-grid gap-2 d-sm-flex justify-content-center">
                        <button type="submit" class="btn btn-success btn-lg rounded-pill px-5 fw-bold">
                            <i class="fas fa-save me-2"></i>Ajouter le Créneau
                        </button>
                        <a href="{% url 'hopital:detail_campagne' campagne.id %}" class="btn btn-secondary btn-lg rounded-pill px-5 fw-bold">
                            Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
