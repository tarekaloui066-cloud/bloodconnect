{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header bg-info text-white text-center py-3 rounded-top-4">
                <h3 class="mb-0 fw-bold">✏️ Modifier la Campagne</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Nom de la campagne</label>
                        {{ form.nom }}
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold">Date de début</label>
                            {{ form.date_debut }}
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold">Date de fin</label>
                            {{ form.date_fin }}
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Lieu</label>
                        {{ form.lieu }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Groupes sanguins ciblés</label>
                        {{ form.groupes_cibles }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Capacité totale</label>
                        {{ form.capacite_totale }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Description</label>
                        {{ form.description }}
                    </div>

                    <div class="d-grid gap-2 d-sm-flex justify-content-center">
                        <button type="submit" class="btn btn-info btn-lg rounded-pill px-5 fw-bold">
                            <i class="fas fa-save me-2"></i>Sauvegarder
                        </button>
                        <a href="{% url 'hopital:gerer_campagnes' %}" class="btn btn-secondary btn-lg rounded-pill px-5 fw-bold">
                            Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
