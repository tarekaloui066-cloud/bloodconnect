{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow p-4">
            <h2 class="text-center text-danger mb-4">Inscription</h2>

            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-bold">Vous êtes :</label>
                    <select name="role" id="role-select" class="form-select">
                        <option value="donneur">Donneur de sang</option>
                        <option value="hopital">Hôpital</option>
                    </select>
                </div>

                <!-- Donor fields -->
                <div id="donneur-username" class="mb-3 fade-box">
                    <label class="form-label">Nom d'utilisateur</label>
                    <input name="username" class="form-control" placeholder="Votre pseudonyme">
                </div>

                <!-- Hospital fields -->
                <div id="hopital-nom" class="mb-3 fade-box" style="display:none;">
                    <label class="form-label">Nom de l'hôpital</label>
                    <input type="text" name="nom_hopital" class="form-control" placeholder="Ex: Hôpital Sahloul">
                </div>

                <div id="donneur-fields" class="fade-box">
                    <div class="mb-3">
                        <label class="form-label">Sexe</label>
                        <select name="sexe" class="form-select">
                            <option value="M">Homme</option>
                            <option value="F">Femme</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date de naissance</label>
                        <input type="date" name="date_naissance" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Groupe sanguin</label>
                        <select name="groupe_sanguin" class="form-select">
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                </div>

                <div id="hopital-fields" class="fade-box" style="display:none;">
                    <div class="mb-3">
                        <label class="form-label">Adresse de l'hôpital</label>
                        <input type="text" name="adresse" class="form-control" placeholder="Adresse complète">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Téléphone</label>
                        <input type="text" name="telephone" class="form-control" placeholder="Ex: +216 XX XXX XXX">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email (pour notifications)</label>
                        <input type="email" name="email" class="form-control" placeholder="email@hopital.tn">
                    </div>
                    <div class="alert alert-info py-2">
                        <small><i class="fas fa-info-circle me-1"></i>Votre compte sera examiné et approuvé par un administrateur avant activation.</small>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ville</label>
                    <input name="ville" class="form-control" placeholder="Ex: Tunis, Sfax...">
                </div>

                <div class="mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="password" class="form-control" placeholder="Minimum 8 caractères">
                </div>

                <button type="submit" class="btn btn-danger w-100 rounded-pill py-2 fw-bold">
                    <i class="fas fa-user-plus me-2"></i>Créer mon compte
                </button>
            </form>

            <div class="mt-3 text-center">
                <p>Déjà un compte ? <a href="{% url 'accounts:login' %}">Connectez-vous</a></p>
            </div>
        </div>
    </div>
</div>

<style>
.fade-box { transition: all 0.3s ease; }
.hide { opacity:0; transform: translateY(-10px); pointer-events:none; }
.show { opacity:1; transform: translateY(0); }
</style>

<script>
const role = document.getElementById("role-select")
const donorUser = document.getElementById("donneur-username")
const hopitalNom = document.getElementById("hopital-nom")
const donorFields = document.getElementById("donneur-fields")
const hopitalFields = document.getElementById("hopital-fields")

function show(el){ el.style.display="block"; setTimeout(()=>el.classList.add("show"),10); el.classList.remove("hide"); }
function hide(el){ el.classList.remove("show"); el.classList.add("hide"); setTimeout(()=>el.style.display="none",300); }

function toggle(){
    if(role.value === "hopital"){
        hide(donorUser); hide(donorFields);
        show(hopitalNom); show(hopitalFields);
    } else {
        show(donorUser); show(donorFields);
        hide(hopitalNom); hide(hopitalFields);
    }
}
role.addEventListener("change", toggle)
toggle()
</script>
{% endblock %}
